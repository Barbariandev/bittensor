name: Ruff - formatter/linter check
permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Ruff format check
        uses: astral-sh/ruff-action@v4
        with:
          version: "0.11.5"
          args: "format --diff"
          src: "bittensor tests"

      - name: Ruff linter check
        uses: astral-sh/ruff-action@v4
        with:
          version: "0.11.5"
          args: "check"
          src: "bittensor"
